<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>workspace</title>
  </head>
  <body class="flex h-screen justify-center items-center">
    <div id="app" class="border w-150 h-150 rounded-2xl flex flex-col   text-center pt-3 gap-3 px-3">

      <h1 id="workspaceText" class="text-3xl">Workspace</h1>
      <div class="flex justify-around items-center gap-3">
        <div id="inputAdd" class="w-full h-10 items-center flex px-3 rounded-2xl">
          <input id="taskInput" type="text" class="w-full h-full rounded-2xl" placeholder="You can add some task here..." required />
        </div>

        <button id="addBtn" class="bg-amber-200 px-3 py-2 rounded-2xl">Add</button>
      
      </div>

      <ul id="listTask" class="flex flex-col gap-3">
        <li class="w-full border rounded-sm py-1 flex px-2 text-center justify-between items-center">Task <i class="fa-solid fa-trash"></i></li>
      </ul>

      




    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
